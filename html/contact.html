<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact · 홍왕기</title>
<meta name="description" content="홍왕기에게 연락하기 — Email, GitHub, Blog, Tel">
<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="stylesheet" href="../css/styles.css">
<style>
.contact-page{min-height:100vh;background:var(--ink);color:#cdddec;position:relative;overflow:hidden;display:flex;flex-direction:column;}
.contact-page::before{content:"";position:absolute;inset:0;background:radial-gradient(1000px 500px at 75% -10%,rgba(18,150,230,.3),transparent 70%),radial-gradient(700px 400px at 10% 110%,rgba(67,182,239,.18),transparent 70%);pointer-events:none;}
.cp-dots{position:absolute;inset:0;background-image:radial-gradient(rgba(255,255,255,.06) 1px,transparent 1px);background-size:28px 28px;-webkit-mask-image:radial-gradient(ellipse 70% 60% at 50% 40%,#000,transparent 75%);mask-image:radial-gradient(ellipse 70% 60% at 50% 40%,#000,transparent 75%);}
.cp-inner{position:relative;z-index:1;flex:1;display:flex;align-items:center;padding:clamp(130px,18vw,180px) 0 70px;}
.cp-eyebrow{color:var(--sky-300);}
.cp-eyebrow::before{background:var(--sky-400);}
.cp-title{font-family:var(--grotesk);font-size:clamp(56px,13vw,150px);font-weight:700;letter-spacing:-.05em;line-height:.9;color:#fff;margin:20px 0 0;}
.cp-title .grad-text{background:linear-gradient(135deg,#7dd3fc,#0578c4);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.cp-msg{font-size:clamp(18px,2.4vw,26px);color:#dbe9f5;font-weight:500;line-height:1.5;margin-top:30px;max-width:620px;letter-spacing:-.02em;}
.cp-msg b{color:#fff;}
.cp-cards{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-top:54px;max-width:720px;}
@media(max-width:620px){.cp-cards{grid-template-columns:1fr;}}
.cp-card{display:flex;align-items:center;gap:18px;padding:24px 26px;border:1px solid rgba(255,255,255,.13);border-radius:var(--r-lg);background:rgba(255,255,255,.04);transition:.3s var(--ease);}
.cp-card:hover{background:rgba(255,255,255,.08);border-color:rgba(67,182,239,.5);transform:translateY(-4px);box-shadow:0 18px 40px rgba(0,0,0,.3);}
.cp-card .ci{width:50px;height:50px;flex:none;border-radius:13px;background:rgba(67,182,239,.14);border:1px solid rgba(67,182,239,.3);display:grid;place-items:center;color:var(--sky-300);transition:.3s;}
.cp-card:hover .ci{background:var(--grad);color:#fff;border-color:transparent;}
.cp-card .ci svg{width:23px;height:23px;}
.cp-card .ct{display:flex;flex-direction:column;gap:3px;min-width:0;}
.cp-card .ct .k{font-family:var(--mono);font-size:12px;color:#8fb0ca;letter-spacing:.08em;text-transform:uppercase;}
.cp-card .ct .v{font-size:15.5px;color:#fff;font-weight:600;overflow-wrap:anywhere;}
.cp-card .arr{margin-left:auto;color:#5d7c96;transition:.3s;flex:none;}
.cp-card:hover .arr{color:var(--sky-300);transform:translate(3px,-3px);}
.cp-card .arr svg{width:18px;height:18px;}
.cp-bottom{position:relative;z-index:1;border-top:1px solid rgba(255,255,255,.1);padding:24px 0;}
.cp-bottom .row{display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px;font-family:var(--mono);font-size:13px;color:#7d97ad;}
.cp-bottom a:hover{color:#fff;}
</style>
</head>
